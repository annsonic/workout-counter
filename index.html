<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙人輪替教練計時器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', "Microsoft JhengHei", sans-serif; }
        .progress-segment { transition: all 0.3s ease; }
        .timer-glow { text-shadow: 0 0 15px rgba(255,255,255,0.1); }

        input.input-error {
            outline: 2px solid #a06060;
            outline-offset: 0px;
        }

        /* ── 莫蘭迪色系變數 ── */
        :root {
            --bg-base:       #1c1c1e;              /* 頁面底色：深煤灰   */
            --bg-card:       #2a2a2d;              /* 卡片：深霧灰       */
            --bg-input:      #3a3a3e;              /* 輸入框：霧炭灰     */
            --color-accent:  #7a9bb5;              /* 強調色：霧藍       */
            --color-muted:   #8a8a8e;              /* 說明文字：霧銀     */
            --color-label:   #b0b0b5;              /* 次要文字           */
            --btn-primary:   #4a6880;              /* 主按鈕：灰藍       */
            --btn-primary-h: #5a7a94;
            --bg-prep:       #7a5c4a;              /* PREP：燻陶土棕     */
            --bg-work:       #4a6b5a;              /* WORK：苔綠霧       */
        }

        /* ── 畫面底色 ── */
        body.screen-setup {
            background-color: var(--bg-base);
        }
        body.screen-prep {
            background-color: var(--bg-prep);
            transition: background-color 0.7s ease;
        }
        body.screen-work {
            background-color: var(--bg-work);
            transition: background-color 0.7s ease;
        }

        /* ── 設定畫面元件 ── */
        #setup-screen {
            background-color: var(--bg-card);
        }
        #setup-screen h1 {
            color: var(--color-accent);
        }
        #setup-screen label {
            color: var(--color-muted);
        }
        #setup-screen input[type="number"] {
            background-color: var(--bg-input);
            color: #e0e0e0;
        }
        #setup-screen input[type="number"]:focus {
            outline: 2px solid var(--color-accent);
        }
        #total-time-label {
            background-color: rgba(255,255,255,0.05);
            color: var(--color-label);
        }
        #start-btn {
            background-color: var(--btn-primary);
            transition: background-color 0.2s, transform 0.1s;
        }
        #start-btn:hover  { background-color: var(--btn-primary-h); }
        #start-btn:active { transform: scale(0.95); }

        /* ── 計時畫面元件 ── */
        #round-label { color: rgba(255,255,255,0.65); }

        .tag-pill {
            background-color: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.80);
        }

        /* 暫停按鈕（預設） */
        #pause-btn {
            background-color: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            transition: background-color 0.2s;
        }
        #pause-btn:hover { background-color: rgba(255,255,255,0.14); }
        /* 暫停中：灰藍高亮 */
        #pause-btn.is-paused {
            background-color: #4a6880;
            border-color: #5a7a94;
            color: #fff;
        }

        /* 重設按鈕 */
        #reset-btn {
            background-color: rgba(160,80,80,0.15);
            border-color: rgba(160,80,80,0.25);
            color: rgba(255,180,180,0.75);
            transition: background-color 0.2s;
        }
        #reset-btn:hover { background-color: rgba(160,80,80,0.28); }
    </style>
</head>
<body class="screen-setup text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 設定畫面 -->
    <div id="setup-screen" class="w-full max-w-md p-8 rounded-3xl shadow-2xl space-y-6">
        <h1 class="text-3xl font-black text-center mb-6">訓練參數設定</h1>
        
        <div class="space-y-4">
            <!-- 第 1 排：動作項目 -->
            <div class="grid grid-cols-12 items-center gap-3">
                <label class="col-span-5 text-right text-sm font-semibold">動作項目 (Rounds)</label>
                <div class="col-span-7">
                    <input type="number" id="input-rounds" min="1" max="99" value="5"
                        class="w-full border-none rounded-xl p-3 text-xl font-bold text-center outline-none"
                        oninput="validateInput(this, 1, 99); updateTotalTime()"
                        onblur="clampInput(this, 1, 99); updateTotalTime()">
                </div>
            </div>
            <!-- 第 1 排：錯誤提示 -->
            <div id="error-rounds" class="grid grid-cols-12 gap-3 hidden">
                <div class="col-span-5"></div>
                <p class="col-span-7 text-xs mt-[-8px]" style="color:#c08080;">請輸入 1 ~ 99 的整數</p>
            </div>

            <!-- 第 2 排：單人循環 -->
            <div class="grid grid-cols-12 items-center gap-3">
                <label class="col-span-5 text-right text-sm font-semibold">單人循環 (Sets)</label>
                <div class="col-span-7">
                    <input type="number" id="input-sets" min="1" max="99" value="2"
                        class="w-full border-none rounded-xl p-3 text-xl font-bold text-center outline-none"
                        oninput="validateInput(this, 1, 99); updateTotalTime()"
                        onblur="clampInput(this, 1, 99); updateTotalTime()">
                </div>
            </div>
            <!-- 第 2 排：錯誤提示 -->
            <div id="error-sets" class="grid grid-cols-12 gap-3 hidden">
                <div class="col-span-5"></div>
                <p class="col-span-7 text-xs mt-[-8px]" style="color:#c08080;">請輸入 1 ~ 99 的整數</p>
            </div>

            <!-- 第 3 排：運動時間 -->
            <div class="grid grid-cols-12 items-center gap-3">
                <label class="col-span-5 text-right text-sm font-semibold">運動時間 (秒)</label>
                <div class="col-span-7">
                    <input type="number" id="input-work" min="10" max="9999" value="40"
                        class="w-full border-none rounded-xl p-3 text-xl font-bold text-center outline-none"
                        oninput="validateInput(this, 10, 9999); updateTotalTime()"
                        onblur="clampInput(this, 10, 9999); updateTotalTime()">
                </div>
            </div>
            <!-- 第 3 排：錯誤提示 -->
            <div id="error-work" class="grid grid-cols-12 gap-3 hidden">
                <div class="col-span-5"></div>
                <p class="col-span-7 text-xs mt-[-8px]" style="color:#c08080;">請輸入 10 ~ 9999 的整數</p>
            </div>
        </div>

        <div id="total-time-label" class="text-center text-sm font-semibold rounded-xl py-2 px-4">
            <!-- 由 JS 動態填入 -->
        </div>

        <button id="start-btn" onclick="startApp()"
            class="w-full text-white font-black py-4 rounded-2xl text-xl shadow-lg mt-4">
            開始訓練
        </button>
    </div>

    <!-- 計時畫面 -->
    <div id="timer-screen" class="hidden w-full h-screen flex flex-col items-center justify-between py-10 px-6 fixed inset-0">
        
        <!-- 上方進度條容器 -->
        <div class="w-full max-w-xl space-y-4">
            <div class="flex justify-between items-end mb-1">
                <span id="round-label" class="font-bold text-lg">項目 1/5</span>
            </div>
            <div id="progress-bar-container" class="flex w-full h-3 gap-1.5">
                <!-- 由 JS 動態生成方塊 -->
            </div>
        </div>

        <!-- 中央主要資訊區 -->
        <div class="text-center flex flex-col items-center flex-1 justify-center">
            <div id="display-id" class="text-[10rem] font-black text-white tracking-tight leading-none mb-2">
                1-1
            </div>
            <div class="flex items-center gap-2 justify-center mt-2">
                <div id="set-label"
                    class="tag-pill text-lg font-bold py-1 rounded-full border w-[125px] text-center">第 1 遍</div>
                <div id="countdown"
                    class="text-6xl font-bold tracking-tighter leading-none timer-glow tabular-nums w-20 text-center">
                    08
                </div>
                <div id="display-label"
                    class="tag-pill text-lg font-bold py-1 rounded-full border w-[125px] text-center">
                    預備 PREP
                </div>
            </div>
        </div>

        <!-- 下方控制區 -->
        <div class="w-full max-w-[280px] flex gap-3 mb-4">
            <button id="pause-btn" onclick="togglePause()"
                class="flex-1 font-medium py-2.5 rounded-xl text-sm border">
                暫停
            </button>
            <button id="reset-btn" onclick="resetApp()"
                class="flex-1 py-2.5 rounded-xl text-sm font-medium border">
                重設
            </button>
        </div>
    </div>

    <script>
        let config = { 
            totalRounds: 0, 
            setsPerRound: 0, 
            prepTime: 8,
            workTime: 0 
        };
        let state = { 
            currentRound: 1, 
            currentSet: 1, 
            currentPlayer: 1, 
            phase: 'PREP', 
            timer: 0,
            isPaused: false,
            isFinished: false
        };
        let intervalId     = null;
        let finishTimeoutId = null;
        let phaseStartTime = null;   // Date.now() 的毫秒時間戳
        let phaseDuration  = 0;      // 當前階段總秒數

        const synth = window.speechSynthesis;
        let voices = [];

        function initVoices() {
            voices = synth.getVoices();
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = () => { voices = synth.getVoices(); };
            }
        }
        initVoices();

        // ─── 需求 1：輸入驗證 ────────────────────────────────────────────

        function validateInput(input, min, max) {
            const val = parseInt(input.value);
            const errorId = 'error-' + input.id.replace('input-', '');
            const errorEl = document.getElementById(errorId);
            const isInvalid = isNaN(val) || val < min || val > max;
            if (isInvalid) {
                input.classList.add('input-error');
                if (errorEl) errorEl.classList.remove('hidden');
            } else {
                input.classList.remove('input-error');
                if (errorEl) errorEl.classList.add('hidden');
            }
        }

        function clampInput(input, min, max) {
            let val = parseInt(input.value);
            if (isNaN(val) || val < min) val = min;
            if (val > max) val = max;
            input.value = val;
            input.classList.remove('input-error');
            const errorId = 'error-' + input.id.replace('input-', '');
            const errorEl = document.getElementById(errorId);
            if (errorEl) errorEl.classList.add('hidden');
        }

        // ─── 需求 2：動態計算總訓練時間 ──────────────────────────────────

        function updateTotalTime() {
            const rounds   = parseInt(document.getElementById('input-rounds').value) || 0;
            const sets     = parseInt(document.getElementById('input-sets').value)   || 0;
            const workTime = parseInt(document.getElementById('input-work').value)   || 0;
            const prepTime = 8;
            const totalSeconds = (prepTime + workTime) * 2 * sets * rounds;
            const label = document.getElementById('total-time-label');
            if (rounds === 0 || sets === 0 || workTime === 0) {
                label.textContent = '總訓練時間：—';
                return;
            }
            if (totalSeconds <= 60) {
                label.textContent = `總訓練時間：約 ${totalSeconds} 秒`;
            } else {
                const minutes = (totalSeconds / 60).toFixed(1);
                label.textContent = `總訓練時間：約 ${minutes} 分鐘`;
            }
        }
        updateTotalTime();

        // ─── 語音 ────────────────────────────────────────────────────────

        function getChineseNumber(num) {
            const chineseNums = ["零","一","二","三","四","五","六","七","八","九","十"];
            return chineseNums[num] || num.toString();
        }

        function speak(msg, rate = 1.5) {
            synth.cancel();
            let u = new SpeechSynthesisUtterance();
            u.text = msg;
            u.rate = rate;
            u.lang = 'zh-TW';
            let targetVoice = null;
            for (let i = 0; i < voices.length; i++) {
                if (voices[i].name.includes("Microsoft HsiaoChen") || voices[i].name.includes("曉臻")) {
                    targetVoice = voices[i]; break;
                }
            }
            if (!targetVoice) {
                for (let i = 0; i < voices.length; i++) {
                    if (voices[i].name.includes("Google 國語") || (voices[i].name.includes("Google") && voices[i].lang.includes("zh-TW"))) {
                        targetVoice = voices[i]; break;
                    }
                }
            }
            if (targetVoice) u.voice = targetVoice;
            synth.speak(u);
        }

        function getPrepPhrase() {
            const r = getChineseNumber(state.currentSet);
            const p = getChineseNumber(state.currentPlayer);
            return `${r}之${p}預備`;
        }

        // ─── 主流程 ──────────────────────────────────────────────────────

        function startApp() {
            clampInput(document.getElementById('input-rounds'), 1, 99);
            clampInput(document.getElementById('input-sets'),   1, 99);
            clampInput(document.getElementById('input-work'),  10, 9999);

            config.totalRounds  = parseInt(document.getElementById('input-rounds').value);
            config.setsPerRound = parseInt(document.getElementById('input-sets').value);
            config.workTime     = parseInt(document.getElementById('input-work').value);

            state.currentRound  = 1;
            state.currentSet    = 1;
            state.currentPlayer = 1;
            state.phase      = 'PREP';
            state.timer      = config.prepTime;
            state.isPaused   = false;
            state.isFinished = false;

            phaseDuration  = config.prepTime;
            phaseStartTime = Date.now();

            initProgressBar();

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('timer-screen').classList.remove('hidden');

            const pauseBtn = document.getElementById('pause-btn');
            pauseBtn.textContent = "暫停";
            pauseBtn.classList.remove('is-paused');

            updateUI();
            speak(getPrepPhrase(), 1.2);
            startTimer();
        }

        function startTimer() {
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(() => {
                if (!state.isPaused) tick();
            }, 200);   // 200ms 輪詢，確保整秒切換最多只晚 200ms
        }

        function tick() {
            const elapsed   = Math.floor((Date.now() - phaseStartTime) / 1000);
            const remaining = phaseDuration - elapsed;
            const prevTimer = state.timer;

            if (remaining > 0) {
                state.timer = remaining;

                if (prevTimer !== remaining) {
                    const isInitialPrep =
                        state.phase === 'PREP' &&
                        state.currentRound  === 1 &&
                        state.currentSet    === 1 &&
                        state.currentPlayer === 1;

                    if (remaining === 6 && state.phase === 'PREP' && !isInitialPrep) {
                        speak(getPrepPhrase(), 1.2);
                    } else if (remaining === 3) { speak("3", 1.6);
                    } else if (remaining === 2) { speak("2", 1.6);
                    } else if (remaining === 1) { speak("1", 1.6); }
                }
            } else {
                state.timer = 0;
                moveToNextState();
            }
            updateUI();
        }

        function moveToNextState() {
            if (state.phase === 'PREP') {
                state.phase    = 'WORK';
                state.timer    = config.workTime;
                phaseDuration  = config.workTime;
                phaseStartTime = Date.now();
                speak("開始", 1.2);
            } else {
                let transitionPrompt = "換人";
                if (state.currentPlayer === 1) {
                    state.currentPlayer = 2;
                } else if (state.currentSet < config.setsPerRound) {
                    state.currentSet++;
                    state.currentPlayer = 1;
                } else if (state.currentRound < config.totalRounds) {
                    state.currentRound++;
                    state.currentSet    = 1;
                    state.currentPlayer = 1;
                    transitionPrompt = "下一個動作";
                } else {
                    finishTraining();
                    return;
                }
                state.phase    = 'PREP';
                state.timer    = config.prepTime;
                phaseDuration  = config.prepTime;
                phaseStartTime = Date.now();
                speak(transitionPrompt, 1.2);
            }
        }

        function initProgressBar() {
            const container = document.getElementById('progress-bar-container');
            container.innerHTML = '';
            for (let i = 1; i <= config.totalRounds; i++) {
                const segment = document.createElement('div');
                segment.className = 'flex-1 rounded-full progress-segment overflow-hidden';
                segment.style.backgroundColor = 'rgba(255,255,255,0.15)';
                segment.innerHTML = `<div id="round-inner-${i}" class="h-full transition-all duration-500" style="width:0%;background-color:rgba(255,255,255,0.70)"></div>`;
                container.appendChild(segment);
            }
        }

        function updateUI() {
            // 訓練結束：只填滿進度條，其他 DOM 保持 finishTraining() 設定的樣子
            if (state.isFinished) {
                for (let i = 1; i <= config.totalRounds; i++) {
                    const inner = document.getElementById(`round-inner-${i}`);
                    if (!inner) continue;
                    inner.style.width   = '100%';
                    inner.style.opacity = '1';
                }
                return;
            }

            document.getElementById('display-id').textContent   = `${state.currentSet}-${state.currentPlayer}`;
            document.getElementById('countdown').textContent    = state.timer.toString().padStart(2, '0');
            document.getElementById('round-label').textContent  = `項目 ${state.currentRound} / ${config.totalRounds}`;
            document.getElementById('set-label').textContent    = `第 ${state.currentSet} 遍`;

            if (state.phase === 'PREP') {
                document.body.className = "screen-prep text-white min-h-screen flex flex-col items-center justify-center p-4";
                document.getElementById('display-label').textContent = "預備 PREP";
            } else {
                document.body.className = "screen-work text-white min-h-screen flex flex-col items-center justify-center p-4";
                document.getElementById('display-label').textContent = "運動 WORK";
            }

            // 分段進度條
            for (let i = 1; i <= config.totalRounds; i++) {
                const inner = document.getElementById(`round-inner-${i}`);
                if (!inner) continue;
                if (i < state.currentRound) {
                    inner.style.width   = '100%';
                    inner.style.opacity = '0.35';
                } else if (i === state.currentRound) {
                    const totalUnitsInRound = config.setsPerRound * 2;
                    const completedUnits    = ((state.currentSet - 1) * 2) + (state.currentPlayer - 1);
                    const percent = (completedUnits / totalUnitsInRound) * 100;
                    inner.style.width   = `${percent}%`;
                    inner.style.opacity = '1';
                } else {
                    inner.style.width = '0%';
                }
            }
        }

        function togglePause() {
            state.isPaused = !state.isPaused;
            const btn = document.getElementById('pause-btn');
            btn.textContent = state.isPaused ? "繼續" : "暫停";

            if (state.isPaused) {
                synth.cancel();
                phaseDuration  = state.timer;   // 剩餘秒數當作新的 duration
            } else {
                phaseStartTime = Date.now();     // 恢復：以現在為新起點
            }

            btn.classList.toggle('is-paused', state.isPaused);
        }

        // ─── 需求 3：訓練結束時填滿所有進度條 ───────────────────────────

        function finishTraining() {
            clearInterval(intervalId);
            state.isFinished = true;

            document.getElementById('display-id').textContent    = "DONE";
            document.getElementById('countdown').textContent     = "00";
            document.getElementById('display-label').textContent = "完成！";
            speak("訓練結束", 1.3);

            updateUI();  // 填滿所有進度條

            finishTimeoutId = setTimeout(() => { resetApp(); }, 3000);
        }

        function resetApp() {
            clearInterval(intervalId);
            if (finishTimeoutId) { clearTimeout(finishTimeoutId); finishTimeoutId = null; }
            synth.cancel();
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('timer-screen').classList.add('hidden');
            document.body.className = "screen-setup text-white min-h-screen flex flex-col items-center justify-center p-4";
        }
    </script>
</body>
</html>
